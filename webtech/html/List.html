<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 style="text-align: center">Learn lists in HTML</h1>

    <!-- ! ORDERED LIST  (black element)

        ! type = "1 /a /A /i /I" 
        ! start = defines from where to start the order
        ! reversed = reverse the order not list item -->
    <ol type="1" start="6" reversed>
      <li>Frontend</li>
      <li>Middleware</li>
      <li>Backend</li>
    </ol>

    <!-- ! UNORDERED LIST   (black element )
         ! type = "disc /circle /square"-->
    <ul type="square">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>

    <!-- ! DISCRIPTION / DEFINATION LIST -->
     <dl>
        <dt>Description term</dt>

        <dd>Description Defination</dd>
     </dl>
  </body>
</html>
